name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Unzip project
        run: |
          unzip *.zip -d project
          find project -name "gradlew" | head -5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          BUILD_DIR=$(find project -name "gradlew" -exec dirname {} \; | head -1)
          echo "Building in: $BUILD_DIR"
          cd "$BUILD_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BurgerClub-debug
          path: "**/app-debug.apk"
