name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip BurgerClubStaffTracker_v2.zip -d project
          ls project/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: |
          cd project/BurgerClub_Clean
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd project/BurgerClub_Clean
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BurgerClub-debug
          path: project/BurgerClub_Clean/app/build/outputs/apk/debug/app-debug.apk
